server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Forward all /api/ requests to the Spring Boot backend container
    # The browser calls http://server-ip:3000/api/... and Nginx forwards it
    # internally to http://app:8080/api/... — no CORS, no URL config needed
    location /api/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React Router fallback — required so refreshing /dashboard doesn't 404
    location / {
        try_files $uri $uri/ /index.html;
    }
}
